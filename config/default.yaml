orion:
  name: Orion
  version: 0.6.1
  codename: Courier
providers:
  default: ollama
  secrets_path: vault/vault.yaml
  openai:
    enabled: false
    model: gpt-4.1-mini
    base_url: https://api.openai.com/v1
    timeout_seconds: 60
  gemini:
    enabled: false
    model: gemini-2.5-flash
    base_url: https://generativelanguage.googleapis.com/v1beta
    timeout_seconds: 60
  ollama:
    enabled: true
    base_url: http://localhost:11434
    model: qwen3.5:9b
    timeout_seconds: 45
  discord_bot:
    enabled: true
workspace:
  default_path: .
memory:
  enabled: true
  database_path: data/orion_memory.sqlite
voice:
  enabled: false
  wake_word: Orion
safety:
  require_approval: true
  dangerous_actions:
  - delete_file
  - restart_service
  - shutdown
  - run_shell_command
plugins:
  path: plugins
  enabled: true
weather:
  location: ''
  units: imperial
  timeout_seconds: 5
calendar:
  enabled: true
  timezone: ''
  google:
    enabled: true
    name: Personal Google
    calendar_id: primary
    credentials_path: config/google-calendar-credentials.json
    token_path: google-calendar-token.json
  microsoft:
    enabled: false
    name: Personal Outlook
    client_id: ''
    tenant: common
    token_path: microsoft-calendar-token.json
    timeout_seconds: 10
email:
  enabled: false
  default_provider: ''
  result_limit: 10
  summary_limit: 10
  cache_seconds: 300
  gmail:
    enabled: false
    name: Gmail
    credentials_path: ''
    token_path: google-gmail-token.json
  microsoft:
    enabled: false
    name: Outlook / Microsoft 365
    client_id: ''
    tenant: common
    token_path: microsoft-mail-token.json
    timeout_seconds: 10
ai:
  active_profile: balanced
  temperature: 0.5
  routing:
    enabled: true
    profile: balanced
    adaptive: true
    minimum_health_samples: 3
team:
  enabled: true
  roles:
    architect:
      agent: architect
      provider: configured-default
      model: configured-default
    engineer:
      agent: engineer
      provider: configured-default
      model: configured-default
    reviewer:
      agent: reviewer
      provider: configured-default
      model: configured-default
  pricing:
    ollama:
      input_per_million: 0
      output_per_million: 0
    openai:
      input_per_million: null
      output_per_million: null
    gemini:
      input_per_million: null
      output_per_million: null
codex_bridge:
  enabled: true
  timeout_seconds: 1800
  max_output_bytes: 5000000
  snapshot_max_files: 10000
  snapshot_max_file_bytes: 25000000
  snapshot_max_total_bytes: 250000000
  diff_max_bytes: 2000000
execution:
  default_engine: codex
vault:
  path: vault/vault.yaml
connect:
  discord_bot:
    enabled: true
    allowed_user_ids: []
    allowed_channel_ids: []
    allowed_role_ids: []
    owner_user_ids: []
    allow_channel_members: false

update:
  repository: Dcannady03/Orion
  channel: main
