orion:
  name: Orion
  version: 0.4.3.2
  codename: Signal
providers:
  default: ollama
  secrets_path: .orion/vault.yaml
  openai:
    enabled: false
    model: gpt-4.1-mini
    base_url: https://api.openai.com/v1
    timeout_seconds: 60
  gemini:
    enabled: false
    model: gemini-2.5-flash
    base_url: https://generativelanguage.googleapis.com/v1beta
    timeout_seconds: 60
  ollama:
    enabled: true
    base_url: http://localhost:11434
    model: qwen3.6:35b
  discord_bot:
    enabled: true
workspace:
  default_path: .
memory:
  enabled: true
  database_path: data/orion_memory.sqlite
voice:
  enabled: false
  wake_word: Orion
safety:
  require_approval: true
  dangerous_actions:
  - delete_file
  - restart_service
  - shutdown
  - run_shell_command
plugins:
  path: plugins
  enabled: true
weather:
  location: ''
  units: imperial
  timeout_seconds: 5
calendar:
  enabled: true
  timezone: ''
  google:
    enabled: true
    name: Personal Google
    calendar_id: primary
    credentials_path: config/google-calendar-credentials.json
    token_path: .orion/google-calendar-token.json
  microsoft:
    enabled: false
    name: Personal Outlook
    client_id: ''
    tenant: common
    token_path: .orion/microsoft-calendar-token.json
    timeout_seconds: 10
ai:
  active_profile: balanced
  temperature: 0.5
vault:
  path: .orion/vault.yaml
connect:
  discord_bot:
    enabled: true
    allowed_user_ids: &id001
    - 586250300705210390
    allowed_channel_ids:
    - 1526972631646081064
    allowed_role_ids: []
    owner_user_ids: *id001
    allow_channel_members: true
